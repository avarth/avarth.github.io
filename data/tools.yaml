- id: nok
  image: "img/kinitra-nok.jpg"
  title: "Building Code incentives calculator"
  title_el: "Υπολογιστής περιβαλλοντικών κινήτρων ΝΟΚ"
  acronym: ""
  tagline_en: "Quantifying the environmental incentives of the Greek Building Code (NOK)"
  tagline_el: "Ποσοτικοποίηση των περιβαλλοντικών κινήτρων του ΝΟΚ"
  body_en: >-
    An application that computes the effects of the environmental incentives
    (bonus floor area and height) granted by the New Building Code (NOK,
    articles 10 & 25) on building volume. It offers visualisations and a range
    of useful indicators.
  body_el: >-
    Εφαρμογή που υπολογίζει τις επιδράσεις των περιβαλλοντικών κινήτρων (bonus
    δόμησης και ύψους) που χορηγεί ο Νέος Οικοδομικός Κανονισμός (ΝΟΚ, άρθρα 10
    & 25) στον όγκο των κτιρίων. Προσφέρει οπτικοποιήσεις και πλήθος χρήσιμων
    δεικτών.
  stats_en: ""
  stats_el: ""
  links:
