- id: usc
  image: "img/usc.jpg"   # empty = placeholder
  title: "Urban Solar Carver"
  acronym: "USC"
  tagline_en: "GPU-accelerated, solar-driven urban form-finding"
  tagline_el: "Εύρεση αστικής μορφής με κριτήριο τον ήλιο, επιταχυνόμενη σε GPU"
  body_en: >-
    Computes the maximum developable building volume that still protects solar
    and daylight access, turning the principle of a "right to light" into a
    practical computational instrument for planning regulation. Ships as a
    Python library with a Grasshopper connector.
  body_el: >-
    Υπολογίζει τον μέγιστο δομήσιμο όγκο που εξακολουθεί να προστατεύει την
    ηλιακή πρόσβαση και τον φυσικό φωτισμό, μετατρέποντας την αρχή του
    «δικαιώματος στον ήλιο» σε ένα πρακτικό υπολογιστικό εργαλείο για τον
    πολεοδομικό κανόνα. Διατίθεται ως βιβλιοθήκη Python με σύνδεσμο για
    Grasshopper.
  stats_en: ""
  stats_el: ""
  links:
    repository: "https://github.com/avarth/UrbanSolarCarver"
    doi: ""
    live: ""

- id: atlas
  image: "img/atlas.jpg"   # empty = placeholder
  title: "Greek Toponymic Atlas"
  title_el: "Ψηφιακός Άτλας Ελληνικών Τοπωνυμίων"
  acronym: ""
  tagline_en: "Nationwide placename mapping from Hellenic Military Geographical Service (ΓΥΣ) data"
  tagline_el: "Πανελλαδική χαρτογράφηση τοπωνυμίων από δεδομένα της ΓΥΣ"
  body_en: >-
    Built from Hellenic Military Geographical Service (ΓΥΣ) data through a
    three-stage pipeline (morphological rules, LLM disambiguation and manual
    validation) that turns raw toponyms into a navigable spatial dataset.
  body_el: >-
    Δημιουργήθηκε από δεδομένα της Γεωγραφικής Υπηρεσίας Στρατού (ΓΥΣ) μέσα από
    έναν αγωγό τριών σταδίων (μορφολογικοί κανόνες, αποσαφήνιση με LLM και
    χειροκίνητη επικύρωση), μετατρέποντας τα ακατέργαστα τοπωνύμια σε ένα
    πλοηγήσιμο χωρικό σύνολο δεδομένων.
  stats_en: "41,932 unique names · 90,592 features"
  stats_el: "41.932 μοναδικά ονόματα · 90.592 σημεία"
  links:
    # Zenodo DOI is the citable anchor. Add the live-atlas and repo URLs here
    # when you want them public (leave "" to hide the link).
    repository: ""
    doi: "https://doi.org/10.5281/zenodo.19443730"
    live: ""

