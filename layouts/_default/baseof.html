<!doctype html>
<html lang="{{ .Site.Language.Params.localeCode | default .Site.Language.Lang }}" class="no-js">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <a class="skip-link" href="#main">{{ i18n "skip_link" }}</a>
  {{ partial "header.html" . }}
  <main id="main" tabindex="-1">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  {{ partial "scripts.html" . }}
</body>
</html>
